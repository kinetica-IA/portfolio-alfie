# ═══════════════════════════════════════════════════════════════════════
# PORTFOLIO MAP — kineticaai.com (portfolio-alfie)
# ═══════════════════════════════════════════════════════════════════════
# Última actualización: 2026-04-02
# Repo: /Users/alfonsonavarro/portfolio-alfie
# Deploy: GitHub Pages via .github/workflows/deploy.yml
# URL: https://www.kineticaai.com
