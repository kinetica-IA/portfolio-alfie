# ─── ARQUITECTURA GENERAL ─────────────────────────────────────────────

framework: Astro
build_deploy: GitHub Pages (push to main → deploy.yml)
dominio: www.kineticaai.com
dns: Namecheap → Cloudflare → GitHub Pages (4 A records + CNAME)

pagina_principal: src/pages/index.astro  # 17 líneas — solo importa y monta secciones
  # Orden de secciones en la página:
  # 1. Landing
  # 2. About
  # 3. Biometrics
  # 4. Projects
  # 5. Services
  # 6. Contact

layout: src/layouts/BaseLayout.astro  # 92 líneas — SEO, schema.org, OG tags, fonts
estilos: src/styles/global.css  # 73 líneas — variables CSS globales, tipografía base

# ─── DESIGN SYSTEM ────────────────────────────────────────────────────

design_system:
  fonts:
    heading: Montserrat
    mono: DM Mono
    body: Poppins (light, Landing only)
  colores:
    bg: "#f0f9f9"
    accent: "#90a7a5"
    warm: "#c4855a"
    green: "#6b9e7a"
    text: "#1a2a28"
  elementos:
    - HRV canvas animation (Landing)
    - Geo SVG rects (Landing background)
    - Scroll reveal (Projects, Services)
    - DM Mono eyebrows (badges, labels)
    - Clinical-organic tone

