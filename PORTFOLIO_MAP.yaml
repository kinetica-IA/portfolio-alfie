# ═══════════════════════════════════════════════════════════════════════
# DATOS Y SCRIPTS
# ═══════════════════════════════════════════════════════════════════════

datos:

  polar_live_json:
    archivo: public/data/polar_live.json
    descripcion: "Serie temporal Polar + predictor + finding — fuente de verdad para toda la web"
    actualizado_por:
      nightly: "scripts/fetch_polar_live.py via .github/workflows/polar-biometrics.yml (06:00 UTC)"
      on_diary_push: "scripts/retrain_predictor.py via .github/workflows/polar-retrain.yml"
    estructura:
      updated_at: "ISO datetime"
      latest: "último día de datos Polar"
      series: "array de 198 entradas (22 claves originales + 8 HRV nuevas)"
      predictor: "resultados del modelo v3 (multi-target, forward selection, bootstrap CIs)"
      finding: "hallazgo top-level (backward compatible)"
    claves_serie_originales:
      - date, hrv_rmssd_night, hrv_rri_mean_ms, hrv_rmssd_daily
      - ans_status, recovery_indicator, recovery_sublevel
      - sleep_score, sleep_duration_h, sleep_wake_min, sleep_interruptions
      - sleep_long_interruptions, sleep_long_wake_min
      - sleep_rem_min, sleep_deep_min, sleep_rem_pct, sleep_deep_pct
      - sleep_refresh_score, sleep_continuity_score, sleep_efficiency_pct
      - sleep_score_rate, steps
    claves_serie_nuevas_hrv:  # Añadidas por Session A
      - hrv_sdnn, hrv_pnn50, hrv_lf_power, hrv_hf_power
      - hrv_lf_hf_ratio, hrv_sd1, hrv_sd2, hrv_dfa_alpha1
    bloque_predictor:  # Escrito por retrain_predictor.py v3
      campos_top_level: "model_version, n_diary, n_training, auc, sensitivity, specificity, features, coefficients, lag_analysis, residuals, models, generated"
      targets: "severity, pem, fatiga, niebla_mental, disfuncion_autonomica — cada uno con best_model, best_auc, best_auc_ci95, selected_features, n_training, threshold, models{lr,rf,gb}"
    bloque_finding: "spearman_rho, p_value, auc, sensitivity_pct, n_pairs, n_diary, description"

  diary_live_csv:
    archivo: data/diary_live.csv
    descripcion: "Diario de síntomas — cada push triggerea retrain"
    entradas: 62
    columnas: "date, schema_version, severidad_global, fatiga, pem, niebla_mental, disfuncion_autonomica, dolor, nota"

  hrv_rr_nightly_csv:
    archivo: data/hrv_rr_nightly.csv
    descripcion: "RR intervals por noche extraídos del ZIP Polar"
    creado_por: "scripts/extract_rr.py (Session A)"

  hrv_features_csv:
    archivo: data/hrv_features.csv
    descripcion: "Métricas HRV avanzadas calculadas por neurokit2"
    creado_por: "scripts/compute_hrv.py (Session A)"

scripts:

  fetch_polar_live:
    archivo: scripts/fetch_polar_live.py
    lineas: 192
    descripcion: "Polar AccessLink API → polar_live.json (nightly)"
    trigger: ".github/workflows/polar-biometrics.yml (cron 06:00 UTC)"
    dependencias: "httpx"
    bug_conocido: >
      Líneas 25-32: FINDING hardcoded con AUC=0.656 — solo se usa como
      fallback si no existe AUC del retrain. Líneas 178-180 protegen
      contra sobreescritura, pero verificar.

  retrain_predictor:
    archivo: scripts/retrain_predictor.py
    lineas: "~500+ post Session B"
    descripcion: "Multi-target LOO-CV + forward selection + bootstrap CIs"
    trigger: ".github/workflows/polar-retrain.yml (push to diary_live.csv)"
    dependencias: "numpy, scikit-learn, scipy"
    version: "v3"

  log_diary:
    archivo: scripts/log_diary.py
    lineas: 327
    descripcion: "Procesa entrada de diario desde diary.html"

  extract_rr:
    archivo: scripts/extract_rr.py
    descripcion: "ZIP Polar → RR intervals nocturnos por fecha"
    creado: "Session A"
    uso: "Local only (ZIP no está en repo)"

  compute_hrv:
    archivo: scripts/compute_hrv.py
    descripcion: "RR intervals → métricas HRV con neurokit2"
    creado: "Session A"
    uso: "Local only"

  merge_hrv:
    archivo: scripts/merge_hrv.py
    descripcion: "Mergea hrv_features.csv en polar_live.json"
    creado: "Session A"
    uso: "Local only (one-time batch)"

  polar_seed:
    archivo: scripts/polar_seed.py
    lineas: 139
    descripcion: "Script de seed inicial para polar_live.json"

# ═══════════════════════════════════════════════════════════════════════
# GITHUB ACTIONS
# ═══════════════════════════════════════════════════════════════════════

workflows:

  deploy:
    archivo: .github/workflows/deploy.yml
    trigger: "push to main"
    descripcion: "Build Astro + deploy a GitHub Pages"

  polar_biometrics:
    archivo: .github/workflows/polar-biometrics.yml
    trigger: "cron 06:00 UTC + workflow_dispatch"
    descripcion: "Fetch Polar API → polar_live.json → commit"
    dependencias: "httpx"
    secretos: "POLAR_ACCESS_TOKEN, POLAR_USER_ID"

  polar_retrain:
    archivo: .github/workflows/polar-retrain.yml
    trigger: "push to data/diary_live.csv + workflow_dispatch"
    descripcion: "Retrain predictor → polar_live.json → commit"
    dependencias: "numpy, scikit-learn, scipy"

