name: Biometrics Live Update

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 07:00 CET / 08:00 CEST
  workflow_dispatch:       # manual trigger for testing

permissions:
  contents: write          # needed to commit polar_live.json back to repo

jobs:
  update-biometrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Fetch Polar data
        env:
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
          POLAR_USER_ID: '63255666'
        run: python scripts/fetch_polar_live.py

      - name: Commit updated biometrics
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/polar_live.json
          if git diff --cached --quiet; then
            echo "No changes to commit — data unchanged."
          else
            git commit -m "chore: biometrics $(date -u '+%Y-%m-%d')"
            git push
          fi
