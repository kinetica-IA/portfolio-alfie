<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorenz — Panel de Control</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #0e0e18;
  font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
  font-size: 11px;
  color: #bbb;
}

#canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}

#panel {
  width: 270px;
  min-width: 270px;
  background: #13131f;
  border-left: 1px solid #1e1e30;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 10px 10px 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
  scrollbar-color: #2a2a44 transparent;
}

.section {
  background: #1a1a2a;
  border: 1px solid #222236;
  border-radius: 7px;
  padding: 10px;
}
.section h3 {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #555;
  margin-bottom: 9px;
}

.ctrl { margin-bottom: 7px; }
.ctrl:last-child { margin-bottom: 0; }
.ctrl label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  color: #888;
  margin-bottom: 3px;
  font-size: 10.5px;
}
.ctrl label .val {
  color: #e8c074;
  font-size: 10px;
  min-width: 42px;
  text-align: right;
}
input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 3px;
  background: #2a2a44;
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #e8c074;
  cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #e8c074;
  border: none;
  cursor: pointer;
}

input[type=color] {
  -webkit-appearance: none;
  border: 1px solid #333;
  border-radius: 4px;
  width: 100%;
  height: 26px;
  cursor: pointer;
  padding: 1px 2px;
  background: #1a1a2a;
}
input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
input[type=color]::-webkit-color-swatch { border: none; border-radius: 3px; }

.btn-row { display: flex; gap: 5px; margin-top: 5px; }
.btn-row:first-child { margin-top: 0; }
button {
  flex: 1;
  padding: 6px 4px;
  border: 1px solid #2a2a44;
  background: #1e1e30;
  color: #999;
  border-radius: 5px;
  cursor: pointer;
  font-size: 10px;
  font-family: inherit;
  transition: background 0.15s, color 0.15s;
}
button:hover { background: #262640; color: #ddd; }
button.active { background: #2e2e50; border-color: #555; color: #e8c074; }

.pt-headers {
  display: grid;
  grid-template-columns: 22px 36px 1fr 1fr 16px;
  gap: 4px;
  padding: 0 4px 4px;
  border-bottom: 1px solid #222;
  margin-bottom: 5px;
}
.pt-headers span {
  font-size: 9px;
  color: #444;
  text-align: center;
}
.pt-row {
  display: grid;
  grid-template-columns: 22px 36px 1fr 1fr 16px;
  gap: 4px;
  align-items: center;
  margin-bottom: 5px;
  padding: 4px;
  border-radius: 5px;
  background: #1e1e2e;
  border: 1px solid #222236;
}
.fib { font-size: 9px; color: #555; text-align: center; }
.pt-row input[type=range] { height: 2px; }
.pt-row input[type=color] { height: 20px; padding: 1px; }
.pt-row input[type=checkbox] {
  accent-color: #e8c074;
  width: 12px;
  height: 12px;
  cursor: pointer;
}

.panel-title {
  font-size: 13px;
  font-weight: 700;
  color: #e8c074;
  letter-spacing: 0.06em;
  padding: 4px 2px 6px;
  border-bottom: 1px solid #1e1e30;
}
.panel-title small {
  display: block;
  font-size: 9px;
  color: #444;
  font-weight: 400;
  margin-top: 2px;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div id="panel">

  <div class="panel-title">
    Lorenz Attractor
    <small>σ(y−x) · x(ρ−z)−y · xy−βz</small>
  </div>

  <div class="section">
    <h3>Sistema Lorenz</h3>
    <div class="ctrl">
      <label>σ sigma <span class="val" id="v-sigma">10.0</span></label>
      <input type="range" id="s-sigma" min="1" max="20" step="0.1" value="10">
    </div>
    <div class="ctrl">
      <label>ρ rho <span class="val" id="v-rho">28.0</span></label>
      <input type="range" id="s-rho" min="0.5" max="60" step="0.5" value="28">
    </div>
    <div class="ctrl">
      <label>β beta <span class="val" id="v-beta">2.67</span></label>
      <input type="range" id="s-beta" min="0.1" max="6" step="0.01" value="2.67">
    </div>
  </div>

  <div class="section">
    <h3>Trazas</h3>
    <div class="ctrl">
      <label>dt integración <span class="val" id="v-dt">0.0080</span></label>
      <input type="range" id="s-dt" min="0.001" max="0.025" step="0.001" value="0.008">
    </div>
    <div class="ctrl">
      <label>Fade / cola <span class="val" id="v-fade">0.010</span></label>
      <input type="range" id="s-fade" min="0.001" max="0.08" step="0.001" value="0.010">
    </div>
    <div class="ctrl">
      <label>Alpha punto <span class="val" id="v-dalpha">0.28</span></label>
      <input type="range" id="s-dalpha" min="0.01" max="0.9" step="0.01" value="0.28">
    </div>
  </div>

  <div class="section">
    <h3>Proyección</h3>
    <div class="ctrl">
      <label>Escala X <span class="val" id="v-sx">0.46</span></label>
      <input type="range" id="s-sx" min="0.05" max="1.4" step="0.01" value="0.46">
    </div>
    <div class="ctrl">
      <label>Escala Z <span class="val" id="v-sz">0.46</span></label>
      <input type="range" id="s-sz" min="0.05" max="1.4" step="0.01" value="0.46">
    </div>
    <div class="ctrl">
      <label>Centro Z <span class="val" id="v-cz">25.0</span></label>
      <input type="range" id="s-cz" min="0" max="50" step="0.5" value="25">
    </div>
    <div class="ctrl">
      <label>Rotación Y° <span class="val" id="v-rot">0°</span></label>
      <input type="range" id="s-rot" min="-180" max="180" step="1" value="0">
    </div>
    <div class="ctrl">
      <label>Inclinación X° <span class="val" id="v-tilt">0°</span></label>
      <input type="range" id="s-tilt" min="-90" max="90" step="1" value="0">
    </div>
  </div>

  <div class="section">
    <h3>Fondo</h3>
    <div class="ctrl">
      <label>Color fondo</label>
      <input type="color" id="bg-color" value="#f8f5ee" style="margin-top:4px">
    </div>
    <div class="ctrl" style="margin-top:8px">
      <label>Opacidad canvas <span class="val" id="v-cop">0.88</span></label>
      <input type="range" id="s-cop" min="0.05" max="1" step="0.01" value="0.88">
    </div>
  </div>

  <div class="section">
    <h3>Partículas — Fibonacci</h3>
    <div class="pt-headers">
      <span>fib</span><span>color</span><span>vel →</span><span>radio ○</span><span></span>
    </div>
    <div id="particles-ui"></div>
  </div>

  <div class="section">
    <h3>Acciones</h3>
    <div class="btn-row">
      <button id="btn-pause">⏸ Pausa</button>
      <button id="btn-clear">⬜ Limpiar</button>
    </div>
    <div class="btn-row">
      <button id="btn-reinit">⟳ Reiniciar pos.</button>
      <button id="btn-reset">↺ Reset todo</button>
    </div>
  </div>

</div>

<script>
const DEF = {
  sigma: 10, rho: 28, beta: 8/3,
  dt: 0.008, fade: 0.010, dotAlpha: 0.28,
  scaleX: 0.46, scaleZ: 0.46, centerZ: 25,
  rotY: 0, tiltX: 0,
  canvasOpacity: 0.88,
  bgColor: '#f8f5ee',
}

const FIB = [21, 13, 8, 5, 3, 2, 1]

const PDEF = [
  { steps: 0.50, dotR: 2.2,  color: '#cd9e5a' },
  { steps: 0.70, dotR: 1.8,  color: '#3c919b' },
  { steps: 0.92, dotR: 1.5,  color: '#bc7082' },
  { steps: 1.12, dotR: 1.2,  color: '#7da57d' },
  { steps: 1.42, dotR: 1.0,  color: '#6c80c0' },
  { steps: 1.92, dotR: 0.75, color: '#c67d58' },
  { steps: 2.50, dotR: 0.5,  color: '#9b80bc' },
]

const INIT = [
  { x:  0.10, y:  0.00, z: 25.00 },
  { x: -0.10, y:  0.10, z: 24.90 },
  { x:  0.20, y: -0.10, z: 25.10 },
  { x: -0.20, y:  0.10, z: 24.80 },
  { x:  0.30, y: -0.20, z: 25.20 },
  { x: -0.30, y:  0.20, z: 24.70 },
  { x:  0.40, y: -0.30, z: 25.30 },
]

let cfg = { ...DEF }
let pts = PDEF.map(d => ({ ...d, on: true }))
let pos = INIT.map(d => ({ ...d }))

const canvas = document.getElementById('canvas')
const ctx    = canvas.getContext('2d', { alpha: false })
let w = 0, h = 0, paused = false

function hexRgb(hex) {
  return [
    parseInt(hex.slice(1,3), 16),
    parseInt(hex.slice(3,5), 16),
    parseInt(hex.slice(5,7), 16),
  ]
}

function fillBg() {
  const [r, g, b] = hexRgb(cfg.bgColor)
  ctx.fillStyle = `rgb(${r},${g},${b})`
  ctx.fillRect(0, 0, w, h)
}

function resize() {
  w = canvas.width  = canvas.offsetWidth
  h = canvas.height = canvas.offsetHeight
  fillBg()
}

window.addEventListener('resize', resize)

function rk4(x, y, z, dt) {
  const s = cfg.sigma, r = cfg.rho, b = cfg.beta
  const f = (x, y, z) => [s*(y-x), x*(r-z)-y, x*y-b*z]
  const [k1x,k1y,k1z] = f(x, y, z)
  const [k2x,k2y,k2z] = f(x+k1x*dt/2, y+k1y*dt/2, z+k1z*dt/2)
  const [k3x,k3y,k3z] = f(x+k2x*dt/2, y+k2y*dt/2, z+k2z*dt/2)
  const [k4x,k4y,k4z] = f(x+k3x*dt,   y+k3y*dt,   z+k3z*dt)
  return {
    x: x + (k1x+2*k2x+2*k3x+k4x)*dt/6,
    y: y + (k1y+2*k2y+2*k3y+k4y)*dt/6,
    z: z + (k1z+2*k2z+2*k3z+k4z)*dt/6,
  }
}

function rotatePoint(x, y, z, rotY, tiltX) {
  const ry = rotY  * Math.PI / 180
  const rx = tiltX * Math.PI / 180
  const x1 =  x * Math.cos(ry) + y * Math.sin(ry)
  const y1 = -x * Math.sin(ry) + y * Math.cos(ry)
  const z1 =  z
  const x2 = x1
  const y2 = y1 * Math.cos(rx) - z1 * Math.sin(rx)
  const z2 = y1 * Math.sin(rx) + z1 * Math.cos(rx)
  return [x2, y2, z2]
}

function tick() {
  requestAnimationFrame(tick)
  if (paused) return

  const [br, bg, bb] = hexRgb(cfg.bgColor)
  ctx.fillStyle = `rgba(${br},${bg},${bb},${cfg.fade})`
  ctx.fillRect(0, 0, w, h)

  const scaleX = w * cfg.scaleX / 20
  const scaleZ = h * cfg.scaleZ / 25

  pts.forEach((pt, i) => {
    if (!pt.on) return
    const sub   = Math.max(1, Math.round(pt.steps))
    const subDt = cfg.dt * pt.steps / sub
    const [cr, cg, cb] = hexRgb(pt.color)

    for (let s = 0; s < sub; s++) {
      const n = rk4(pos[i].x, pos[i].y, pos[i].z, subDt)
      pos[i] = n

      const [px, , pz] = rotatePoint(n.x, n.y, n.z, cfg.rotY, cfg.tiltX)
      const cx = w * 0.5 + px * scaleX
      const cy = h * 0.5 - (pz - cfg.centerZ) * scaleZ

      ctx.beginPath()
      ctx.arc(cx, cy, pt.dotR, 0, Math.PI * 2)
      ctx.fillStyle = `rgba(${cr},${cg},${cb},${cfg.dotAlpha})`
      ctx.fill()
    }
  })
}

function bindSlider(sliderId, valId, cfgKey, fmt, onChange) {
  const sl = document.getElementById(sliderId)
  const vl = document.getElementById(valId)
  sl.addEventListener('input', () => {
    cfg[cfgKey] = parseFloat(sl.value)
    vl.textContent = fmt(cfg[cfgKey])
    if (onChange) onChange(cfg[cfgKey])
  })
}

const f1   = v => v.toFixed(1)
const f2   = v => v.toFixed(2)
const f3   = v => v.toFixed(3)
const f4   = v => v.toFixed(4)
const fdeg = v => Math.round(v) + '°'

bindSlider('s-sigma', 'v-sigma', 'sigma', f1)
bindSlider('s-rho',   'v-rho',   'rho',   f1)
bindSlider('s-beta',  'v-beta',  'beta',  f2)
bindSlider('s-dt',    'v-dt',    'dt',    f4)
bindSlider('s-fade',  'v-fade',  'fade',  f3)
bindSlider('s-dalpha','v-dalpha','dotAlpha', f2)
bindSlider('s-sx',    'v-sx',   'scaleX', f2)
bindSlider('s-sz',    'v-sz',   'scaleZ', f2)
bindSlider('s-cz',    'v-cz',   'centerZ', f1)
bindSlider('s-rot',   'v-rot',  'rotY',  fdeg)
bindSlider('s-tilt',  'v-tilt', 'tiltX', fdeg)
bindSlider('s-cop',   'v-cop',  'canvasOpacity', f2, v => { canvas.style.opacity = v })

document.getElementById('bg-color').addEventListener('input', e => {
  cfg.bgColor = e.target.value
})

const pUI = document.getElementById('particles-ui')
pts.forEach((pt, i) => {
  const row = document.createElement('div')
  row.className = 'pt-row'
  row.innerHTML = `
    <span class="fib">${FIB[i]}</span>
    <input type="color" value="${pt.color}">
    <input type="range" min="0.1" max="5" step="0.05" value="${pt.steps}">
    <input type="range" min="0.2" max="5" step="0.05" value="${pt.dotR}">
    <input type="checkbox" checked>
  `
  pUI.appendChild(row)
  const [cEl, stEl, drEl, onEl] = row.querySelectorAll('input')
  cEl.addEventListener('input',  e => { pts[i].color = e.target.value })
  stEl.addEventListener('input', e => { pts[i].steps = parseFloat(e.target.value) })
  drEl.addEventListener('input', e => { pts[i].dotR  = parseFloat(e.target.value) })
  onEl.addEventListener('change',e => { pts[i].on    = e.target.checked })
})

document.getElementById('btn-pause').addEventListener('click', function () {
  paused = !paused
  this.textContent = paused ? '▶ Reanudar' : '⏸ Pausa'
  this.classList.toggle('active', paused)
})

document.getElementById('btn-clear').addEventListener('click', fillBg)

document.getElementById('btn-reinit').addEventListener('click', () => {
  pos = INIT.map(d => ({ ...d }))
  fillBg()
})

document.getElementById('btn-reset').addEventListener('click', () => {
  location.reload()
})

resize()
canvas.style.opacity = cfg.canvasOpacity
tick()
</script>
</body>
</html>
